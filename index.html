<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NeuroCheck — Memory & Sleep Assessment</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#060612;
  --surface:#0d0d1f;
  --surface2:#13132a;
  --border:#1e1e3f;
  --accent:#00f5d4;
  --accent2:#f500b8;
  --accent3:#ffe600;
  --text:#eeeeff;
  --muted:#5555aa;
  --danger:#ff3366;
  --success:#00f5d4;

  /* Game colors */
  --col-red:#ff3b5c;
  --col-blue:#3b8cff;
  --col-green:#3bff8c;
  --col-yellow:#ffe03b;
  --col-purple:#b83bff;
  --col-orange:#ff8c3b;
  --col-pink:#ff3bb8;
  --col-teal:#3bfff0;
}

body{
  font-family:'Outfit',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}

.stars{position:fixed;inset:0;z-index:0;overflow:hidden;}
.stars::before,.stars::after{
  content:'';position:absolute;inset:0;
  background-image:
    radial-gradient(1px 1px at 10% 20%,rgba(255,255,255,0.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 30% 70%,rgba(255,255,255,0.3) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 50% 10%,rgba(255,255,255,0.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 70% 50%,rgba(255,255,255,0.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 85% 30%,rgba(255,255,255,0.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 20% 90%,rgba(255,255,255,0.2) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 60% 80%,rgba(255,255,255,0.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 90% 90%,rgba(255,255,255,0.4) 0%,transparent 100%);
  background-size:400px 400px;
}
.stars::after{background-size:600px 600px;opacity:0.5;}

.blob{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;}
.blob1{width:500px;height:500px;background:rgba(0,245,212,0.07);top:-100px;left:-100px;}
.blob2{width:400px;height:400px;background:rgba(245,0,184,0.07);bottom:-100px;right:-100px;}

.screen{
  position:relative;z-index:1;
  min-height:100vh;
  display:none;flex-direction:column;
  align-items:center;justify-content:center;
  padding:40px 20px;
}
.screen.active{display:flex;}

/* PROGRESS */
.progress-wrap{position:fixed;top:0;left:0;right:0;z-index:100;height:3px;background:var(--border);}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width 0.5s cubic-bezier(0.4,0,0.2,1);box-shadow:0 0 8px var(--accent);}
.step-label{position:fixed;top:16px;right:20px;z-index:100;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:0.1em;}

/* WELCOME */
#screen-welcome .logo{font-size:13px;letter-spacing:0.3em;color:var(--accent);text-transform:uppercase;margin-bottom:32px;display:flex;align-items:center;gap:10px;}
.logo-bar{width:30px;height:2px;background:var(--accent);}
#screen-welcome h1{font-size:clamp(48px,8vw,88px);font-weight:900;line-height:0.95;text-align:center;margin-bottom:16px;}
h1 .highlight{background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.subtitle{font-size:16px;color:var(--muted);font-weight:300;text-align:center;max-width:420px;line-height:1.7;margin-bottom:48px;}
.username-box{width:100%;max-width:420px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;}
.username-box label{display:block;font-size:11px;letter-spacing:0.15em;color:var(--muted);text-transform:uppercase;margin-bottom:10px;}
.username-box input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px 16px;font-family:'Outfit',sans-serif;font-size:18px;font-weight:600;color:var(--text);outline:none;transition:border-color 0.2s,box-shadow 0.2s;}
.username-box input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,245,212,0.15);}
.username-box input::placeholder{color:var(--muted);font-weight:300;}
.btn-start{width:100%;margin-top:16px;padding:16px;background:linear-gradient(135deg,var(--accent),#00c9ad);border:none;border-radius:10px;font-family:'Outfit',sans-serif;font-size:16px;font-weight:700;color:var(--bg);cursor:pointer;box-shadow:0 8px 32px rgba(0,245,212,0.3);transition:all 0.2s;letter-spacing:0.05em;}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,245,212,0.5);}

/* SURVEY */
#screen-survey{justify-content:flex-start;padding-top:80px;}
.survey-card{width:100%;max-width:620px;animation:slideIn 0.4s cubic-bezier(0.34,1.2,0.64,1);}
@keyframes slideIn{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
.q-number{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.2em;color:var(--accent);margin-bottom:12px;text-transform:uppercase;}
.q-text{font-size:clamp(20px,3vw,28px);font-weight:700;line-height:1.3;margin-bottom:32px;}
.options{display:flex;flex-direction:column;gap:12px;}
.option{display:flex;align-items:center;gap:16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 20px;cursor:pointer;transition:all 0.2s;text-align:left;width:100%;font-family:'Outfit',sans-serif;font-size:15px;color:var(--text);}
.option:hover{border-color:var(--accent);background:rgba(0,245,212,0.06);transform:translateX(4px);}
.option.selected{border-color:var(--accent);background:rgba(0,245,212,0.12);box-shadow:0 0 0 1px rgba(0,245,212,0.3);}
.opt-key{width:32px;height:32px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;color:var(--muted);flex-shrink:0;transition:all 0.2s;}
.option.selected .opt-key{background:var(--accent);color:var(--bg);border-color:var(--accent);}
.opt-label{font-weight:500;}
.slider-wrap{margin-top:8px;}
.range-slider{width:100%;-webkit-appearance:none;appearance:none;height:6px;border-radius:3px;outline:none;cursor:pointer;}
.range-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:22px;height:22px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 0 0 4px rgba(0,245,212,0.2);transition:box-shadow 0.2s;}
.range-slider::-webkit-slider-thumb:hover{box-shadow:0 0 0 8px rgba(0,245,212,0.2);}
.slider-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:8px;font-family:'JetBrains Mono',monospace;}
.slider-val{font-family:'JetBrains Mono',monospace;font-size:42px;font-weight:700;color:var(--accent);text-align:center;margin:16px 0;line-height:1;}
.slider-unit{font-size:14px;color:var(--muted);}
.btn-next{margin-top:28px;padding:14px 36px;background:var(--accent);border:none;border-radius:10px;font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;color:var(--bg);cursor:pointer;box-shadow:0 6px 24px rgba(0,245,212,0.3);transition:all 0.2s;opacity:0.4;pointer-events:none;}
.btn-next.ready{opacity:1;pointer-events:all;}
.btn-next.ready:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(0,245,212,0.5);}

/* ── MEMORY TEST ── */
#screen-memory{gap:0;}
.memory-header{text-align:center;margin-bottom:32px;}
.memory-header h2{font-size:clamp(24px,4vw,40px);font-weight:900;margin-bottom:8px;}
.memory-header p{font-size:15px;color:var(--muted);font-weight:300;}

.phase-badge{display:inline-flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:8px 16px;font-size:12px;letter-spacing:0.1em;color:var(--muted);margin-bottom:24px;text-transform:uppercase;}
.phase-dot{width:6px;height:6px;border-radius:50%;}

/* COLOR GRID — memorize */
.color-grid{
  display:grid;
  gap:14px;
  max-width:480px;width:100%;
  margin:0 auto 28px;
}
.color-grid.g4{grid-template-columns:repeat(4,1fr);}
.color-grid.g3{grid-template-columns:repeat(3,1fr);}

.color-tile{
  aspect-ratio:1;border-radius:16px;
  border:3px solid rgba(255,255,255,0.08);
  transition:all 0.35s cubic-bezier(0.34,1.4,0.64,1);
  cursor:default;
  position:relative;overflow:hidden;
}
.color-tile::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.18) 0%,transparent 60%);
  border-radius:inherit;
}
.color-tile.hidden-tile{background:var(--surface2)!important;border-color:var(--border);}
.color-tile.reveal{
  animation:tileReveal 0.45s cubic-bezier(0.34,1.5,0.64,1) forwards;
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
}
@keyframes tileReveal{from{transform:scale(0.6) rotate(-6deg);opacity:0;}to{transform:scale(1) rotate(0deg);opacity:1;}}

/* color label inside tile */
.tile-label{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'Outfit',sans-serif;font-weight:900;
  font-size:clamp(11px,2vw,15px);
  color:rgba(255,255,255,0.85);
  text-shadow:0 1px 4px rgba(0,0,0,0.5);
  letter-spacing:0.05em;
  text-transform:uppercase;
  z-index:1;
}

/* COUNTDOWN */
.countdown-ring{width:80px;height:80px;position:relative;margin:0 auto 20px;}
.countdown-ring svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:var(--border);stroke-width:6;}
.ring-fill{fill:none;stroke:var(--accent);stroke-width:6;stroke-dasharray:226;stroke-dashoffset:0;transition:stroke-dashoffset 1s linear;stroke-linecap:round;}
.ring-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:500;color:var(--accent);}

/* SEQUENCE DOTS */
.sequence-display{display:flex;gap:8px;justify-content:center;margin-bottom:20px;flex-wrap:wrap;}
.seq-dot{
  width:34px;height:34px;border-radius:8px;
  background:var(--surface2);border:2px solid var(--border);
  transition:all 0.3s cubic-bezier(0.34,1.4,0.64,1);
  flex-shrink:0;
}
.seq-dot.filled{border-width:2px;transform:scale(1.1);}

/* RECALL GRID — buttons */
.recall-grid{
  display:grid;
  gap:12px;
  max-width:480px;width:100%;
  margin:0 auto 20px;
}
.recall-grid.g4{grid-template-columns:repeat(4,1fr);}
.recall-grid.g3{grid-template-columns:repeat(3,1fr);}

.recall-btn{
  aspect-ratio:1;border-radius:16px;
  border:3px solid rgba(255,255,255,0.1);
  cursor:pointer;
  transition:all 0.2s;
  position:relative;overflow:hidden;
  font-family:'Outfit',sans-serif;font-weight:900;
  font-size:clamp(11px,2vw,14px);
  color:rgba(255,255,255,0.85);
  text-shadow:0 1px 4px rgba(0,0,0,0.5);
  letter-spacing:0.05em;text-transform:uppercase;
}
.recall-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.18) 0%,transparent 60%);}
.recall-btn:hover{transform:scale(1.06);box-shadow:0 8px 28px rgba(0,0,0,0.4);border-color:rgba(255,255,255,0.3);}
.recall-btn:active{transform:scale(0.96);}
.recall-btn.correct{
  border-color:white!important;
  box-shadow:0 0 0 4px rgba(255,255,255,0.3),0 8px 32px rgba(0,0,0,0.4)!important;
  animation:pop 0.35s cubic-bezier(0.34,1.6,0.64,1);
}
.recall-btn.wrong{
  filter:brightness(0.4) grayscale(1);
  animation:shake 0.35s ease;
  pointer-events:none;
}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.recall-btn:disabled{opacity:0.4;pointer-events:none;filter:grayscale(0.5);}

/* round info */
.round-info{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);text-align:center;margin-bottom:16px;letter-spacing:0.08em;}

/* ── RESULTS ── */
#screen-results{gap:24px;}
.result-header{text-align:center;}
.result-header .grade{font-size:clamp(80px,15vw,140px);font-weight:900;line-height:1;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.result-header h2{font-size:24px;font-weight:700;margin-bottom:8px;}
.result-header p{font-size:15px;color:var(--muted);}
.score-breakdown{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:500px;}
.score-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;text-align:center;}
.score-card .val{font-family:'JetBrains Mono',monospace;font-size:40px;font-weight:500;line-height:1;margin-bottom:6px;}
.score-card .lbl{font-size:11px;letter-spacing:0.12em;color:var(--muted);text-transform:uppercase;}
.mem-color{color:var(--accent3);}
.slp-color{color:var(--accent);}
.insight-box{width:100%;max-width:500px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px 24px;font-size:15px;line-height:1.7;color:var(--muted);}
.insight-box strong{color:var(--text);}
.btn-submit{padding:16px 48px;background:linear-gradient(135deg,var(--accent2),#cc00a0);border:none;border-radius:12px;font-family:'Outfit',sans-serif;font-size:17px;font-weight:700;color:white;cursor:pointer;box-shadow:0 8px 32px rgba(245,0,184,0.35);transition:all 0.2s;}
.btn-submit:hover{transform:translateY(-3px);box-shadow:0 14px 44px rgba(245,0,184,0.5);}
.btn-submit:disabled{opacity:0.5;pointer-events:none;}
.submit-status{font-size:13px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-align:center;min-height:20px;}
.submit-status.ok{color:var(--success);}
.submit-status.err{color:var(--danger);}
.sep{width:60px;height:2px;background:var(--border);margin:8px auto;}

/* TOAST */
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 24px;font-size:14px;z-index:200;box-shadow:0 8px 32px rgba(0,0,0,0.4);animation:toastIn 0.3s ease;display:none;}
.toast.show{display:block;}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>
<body>

<div class="stars"></div>
<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="progress-wrap"><div class="progress-fill" id="progress" style="width:0%"></div></div>
<div class="step-label" id="step-label"></div>

<!-- WELCOME -->
<div class="screen active" id="screen-welcome">
  <div class="logo"><div class="logo-bar"></div>NeuroCheck<div class="logo-bar"></div></div>
  <h1>MIND &<br><span class="highlight">SLEEP</span><br>TRACKER</h1>
  <p class="subtitle">A quick color memory and sleep quality assessment. Takes about 2 minutes.</p>
  <div class="username-box">
    <label>Your name to get started</label>
    <input type="text" id="username-input" placeholder="e.g. Ada Lovelace" maxlength="40" autocomplete="off"/>
    <button class="btn-start" onclick="startApp()">BEGIN ASSESSMENT →</button>
  </div>
</div>

<!-- SURVEY -->
<div class="screen" id="screen-survey">
  <div class="survey-card" id="survey-card"></div>
</div>

<!-- MEMORY TEST -->
<div class="screen" id="screen-memory"></div>

<!-- RESULTS -->
<div class="screen" id="screen-results"></div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://backend-ks6g.onrender.com';

// ── COLORS ──────────────────────────────────────────────────────
const COLORS = [
  { name:'Red',    hex:'#ff3b5c' },
  { name:'Blue',   hex:'#3b8cff' },
  { name:'Green',  hex:'#3bff8c' },
  { name:'Yellow', hex:'#ffe03b' },
  { name:'Purple', hex:'#b83bff' },
  { name:'Orange', hex:'#ff8c3b' },
  { name:'Pink',   hex:'#ff3bb8' },
  { name:'Teal',   hex:'#3bfff0' },
];

// ── ROUNDS: easier — fewer colors, more time ─────────────────────
const MEM_ROUNDS = [
  { count:3, cols:3, time:5  },  // Round 1: 3 colors, 5s
  { count:4, cols:4, time:6  },  // Round 2: 4 colors, 6s
  { count:6, cols:3, time:8  },  // Round 3: 6 colors, 8s
];

// ── STATE ────────────────────────────────────────────────────────
let username='', sleepScore=0, memoryScore=0;
let surveyAnswers={}, currentQ=0;
let memRound=0, memRoundScores=[];
let memSequence=[], memUserSeq=[], memCorrect=0;
let countdownTimer=null;

const TOTAL_STEPS = 5 + 3; // 5 survey + 3 rounds

// ── SURVEY ───────────────────────────────────────────────────────
const surveyQuestions = [
  {
    id:'hours', type:'options',
    text:'How many hours did you sleep last night?',
    options:[
      {label:'Less than 4 hours', score:10, key:'A'},
      {label:'4–5 hours',         score:30, key:'B'},
      {label:'6–7 hours',         score:70, key:'C'},
      {label:'7–9 hours',         score:100,key:'D'},
    ]
  },
  {
    id:'quality', type:'options',
    text:'How would you rate your sleep quality?',
    options:[
      {label:'Very poor — kept waking up', score:10, key:'A'},
      {label:'Poor — restless night',      score:30, key:'B'},
      {label:'Fair — okay but not great',  score:60, key:'C'},
      {label:'Good — mostly restful',      score:85, key:'D'},
    ]
  },
  {
    id:'wakeup', type:'options',
    text:'How did you feel waking up this morning?',
    options:[
      {label:'Exhausted, barely functional', score:5,  key:'A'},
      {label:'Groggy, slow to get going',    score:35, key:'B'},
      {label:'Okay, took a little time',     score:65, key:'C'},
      {label:'Refreshed and alert',          score:100,key:'D'},
    ]
  },
  {
    id:'interruptions', type:'options',
    text:'How many times did you wake up during the night?',
    options:[
      {label:'5+ times',   score:10, key:'A'},
      {label:'3–4 times',  score:40, key:'B'},
      {label:'1–2 times',  score:75, key:'C'},
      {label:'Not at all', score:100,key:'D'},
    ]
  },
  {
    id:'hours_slider', type:'slider',
    text:'On average, how many hours do you sleep per night?',
    min:3, max:12, default:7,
    labels:['3h','12h'],
    scoreFunc: v => Math.round(Math.min(100,Math.max(0,(v<=6?v*10:v<=9?60+(v-6)*10:100-(v-9)*15))))
  }
];

// ── NAV ──────────────────────────────────────────────────────────
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function setProgress(step){
  const pct=Math.round((step/TOTAL_STEPS)*100);
  document.getElementById('progress').style.width=pct+'%';
  document.getElementById('step-label').textContent=step+' / '+TOTAL_STEPS;
}

function startApp(){
  username=document.getElementById('username-input').value.trim();
  if(!username){showToast('Please enter your name');return;}
  showScreen('screen-survey');
  setProgress(1);
  renderQuestion(0);
}

// ── SURVEY RENDER ────────────────────────────────────────────────
function renderQuestion(index){
  currentQ=index;
  const q=surveyQuestions[index];
  const card=document.getElementById('survey-card');
  setProgress(index+1);

  let html=`
    <div class="q-number">Question ${index+1} of ${surveyQuestions.length} — Sleep Survey</div>
    <div class="q-text">${q.text}</div>
  `;

  if(q.type==='options'){
    html+=`<div class="options">`;
    q.options.forEach(o=>{
      html+=`<button class="option" onclick="selectOption(${index},'${o.key}',${o.score},this)">
        <div class="opt-key">${o.key}</div>
        <div class="opt-label">${o.label}</div>
      </button>`;
    });
    html+=`</div>`;
  } else if(q.type==='slider'){
    html+=`
      <div class="slider-wrap">
        <div class="slider-val"><span id="slider-num">${q.default}</span> <span class="slider-unit">hrs</span></div>
        <input type="range" class="range-slider" id="slider-input"
          min="${q.min}" max="${q.max}" value="${q.default}"
          oninput="updateSlider(this.value,${index})">
        <div class="slider-labels"><span>${q.labels[0]}</span><span>${q.labels[1]}</span></div>
      </div>`;
  }

  html+=`<button class="btn-next ${q.type==='slider'?'ready':''}" id="btn-next" onclick="nextQuestion()">
    ${index===surveyQuestions.length-1?'Start Color Memory Test →':'Next →'}
  </button>`;

  card.innerHTML=html;
  card.style.animation='none';
  requestAnimationFrame(()=>{card.style.animation='';card.className='survey-card';});

  if(surveyAnswers[q.id]!==undefined && q.type==='options'){
    document.querySelectorAll('.option').forEach(opt=>{
      if(opt.querySelector('.opt-key').textContent===surveyAnswers[q.id].key)
        opt.classList.add('selected');
    });
    document.getElementById('btn-next').classList.add('ready');
  }
  if(q.type==='slider'){
    surveyAnswers[q.id]={score:q.scoreFunc(q.default),val:q.default};
    updateSlider(q.default,index);
  }
}

function selectOption(qIdx,key,score,el){
  document.querySelectorAll('.option').forEach(o=>o.classList.remove('selected'));
  el.classList.add('selected');
  surveyAnswers[surveyQuestions[qIdx].id]={key,score};
  document.getElementById('btn-next').classList.add('ready');
}

function updateSlider(val,qIdx){
  document.getElementById('slider-num').textContent=val;
  const q=surveyQuestions[qIdx];
  surveyAnswers[q.id]={score:q.scoreFunc(parseInt(val)),val:parseInt(val)};
  const input=document.getElementById('slider-input');
  const pct=((val-q.min)/(q.max-q.min))*100;
  input.style.background=`linear-gradient(to right,var(--accent) 0%,var(--accent) ${pct}%,var(--border) ${pct}%,var(--border) 100%)`;
}

function nextQuestion(){
  if(currentQ<surveyQuestions.length-1){
    renderQuestion(currentQ+1);
  } else {
    const scores=Object.values(surveyAnswers).map(a=>a.score);
    sleepScore=Math.round(scores.reduce((a,b)=>a+b,0)/scores.length);
    startMemoryTest();
  }
}

// ── MEMORY TEST ──────────────────────────────────────────────────
function startMemoryTest(){
  showScreen('screen-memory');
  memRound=0; memRoundScores=[];
  runMemRound();
}

function pickColors(count){
  return [...COLORS].sort(()=>Math.random()-0.5).slice(0,count);
}

function runMemRound(){
  const cfg=MEM_ROUNDS[memRound];
  memSequence=pickColors(cfg.count);
  memUserSeq=[];
  memCorrect=0;
  setProgress(surveyQuestions.length+1+memRound);
  renderMemorizePhase(cfg);
}

function renderMemorizePhase(cfg){
  const mem=document.getElementById('screen-memory');

  const tiles=memSequence.map((c,i)=>`
    <div class="color-tile hidden-tile" id="tile-${i}" style="animation-delay:${i*130}ms">
      <div class="tile-label">${c.name}</div>
    </div>`).join('');

  mem.innerHTML=`
    <div class="phase-badge">
      <div class="phase-dot" style="background:var(--accent3)"></div>
      Round ${memRound+1} of ${MEM_ROUNDS.length} — Memorize
    </div>
    <div class="memory-header">
      <h2>Memorize the colors</h2>
      <p>Remember the order of these ${cfg.count} colors</p>
    </div>
    <div class="countdown-ring">
      <svg width="80" height="80" viewBox="0 0 90 90">
        <circle class="ring-bg" cx="45" cy="45" r="36"/>
        <circle class="ring-fill" id="ring-fill" cx="45" cy="45" r="36"/>
      </svg>
      <div class="ring-text" id="ring-num">${cfg.time}</div>
    </div>
    <div class="color-grid g${cfg.cols}">${tiles}</div>
  `;

  // reveal tiles
  memSequence.forEach((c,i)=>{
    setTimeout(()=>{
      const t=document.getElementById(`tile-${i}`);
      if(t){
        t.classList.remove('hidden-tile');
        t.classList.add('reveal');
        t.style.background=c.hex;
        t.style.boxShadow=`0 6px 24px ${c.hex}55`;
      }
    },i*160+200);
  });

  // countdown
  let t=cfg.time;
  if(countdownTimer) clearInterval(countdownTimer);
  countdownTimer=setInterval(()=>{
    t--;
    const rf=document.getElementById('ring-fill');
    const rn=document.getElementById('ring-num');
    if(rf) rf.style.strokeDashoffset=226*(1-(t/cfg.time));
    if(rn) rn.textContent=t;
    if(t<=0){ clearInterval(countdownTimer); renderRecallPhase(cfg); }
  },1000);
}

function renderRecallPhase(cfg){
  const mem=document.getElementById('screen-memory');

  // build answer pool: correct colors + decoy colors, shuffled
  const decoyCount=Math.min(COLORS.length-cfg.count, cfg.count);
  const decoys=COLORS.filter(c=>!memSequence.includes(c))
    .sort(()=>Math.random()-0.5).slice(0,decoyCount);
  const allOptions=[...memSequence,...decoys].sort(()=>Math.random()-0.5);

  const dots=memSequence.map((_,i)=>
    `<div class="seq-dot" id="dot-${i}"></div>`).join('');

  const buttons=allOptions.map(c=>
    `<button class="recall-btn" style="background:${c.hex};box-shadow:0 4px 20px ${c.hex}44"
      onclick="recallSelect('${c.name}',this)">${c.name}</button>`
  ).join('');

  mem.innerHTML=`
    <div class="phase-badge">
      <div class="phase-dot" style="background:var(--accent2)"></div>
      Round ${memRound+1} — Recall
    </div>
    <div class="recall-prompt" style="text-align:center;margin-bottom:20px">
      <h3 style="font-size:22px;font-weight:700;margin-bottom:6px">Tap the colors in order</h3>
      <p style="font-size:14px;color:var(--muted)">Recreate the sequence from memory</p>
    </div>
    <div class="round-info">${memRound===0?'Hint: the color names are shown on each tile!':''}</div>
    <div class="sequence-display">${dots}</div>
    <div class="recall-grid g${cfg.cols}">${buttons}</div>
  `;
}

function recallSelect(colorName, btn){
  const expected=memSequence[memUserSeq.length];
  memUserSeq.push(colorName);
  const dotIdx=memUserSeq.length-1;
  const dot=document.getElementById(`dot-${dotIdx}`);

  if(colorName===expected.name){
    btn.classList.add('correct');
    btn.disabled=true;
    if(dot){
      dot.style.background=expected.hex;
      dot.style.boxShadow=`0 0 12px ${expected.hex}88`;
      dot.style.borderColor=expected.hex;
      dot.classList.add('filled');
    }
    memCorrect++;

    if(memUserSeq.length===memSequence.length){
      // round complete
      const roundScore=Math.round((memCorrect/memSequence.length)*100);
      memRoundScores.push(roundScore);
      memRound++;
      if(memRound<MEM_ROUNDS.length){
        setTimeout(()=>runMemRound(),700);
      } else {
        setTimeout(()=>showResults(),700);
      }
    }
  } else {
    btn.classList.add('wrong');
    // still count partial score
    const roundScore=Math.round((memCorrect/memSequence.length)*100);
    memRoundScores.push(roundScore);
    memRound++;
    if(memRound<MEM_ROUNDS.length){
      setTimeout(()=>runMemRound(),900);
    } else {
      setTimeout(()=>showResults(),900);
    }
  }
}

// ── RESULTS ──────────────────────────────────────────────────────
function showResults(){
  memoryScore=memRoundScores.length>0
    ? Math.round(memRoundScores.reduce((a,b)=>a+b,0)/memRoundScores.length)
    : 0;

  const total=Math.round((memoryScore+sleepScore)/2);
  const grade=total>=90?'S':total>=80?'A':total>=65?'B':total>=50?'C':'D';
  const gradeMsg={
    S:'Outstanding. Your mind is sharp and your rest is deep.',
    A:'Excellent performance across memory and sleep.',
    B:'Good results. A bit more sleep could sharpen you further.',
    C:'Fair. Prioritize sleep consistency to boost cognition.',
    D:'Your body and mind need more rest. Take care of yourself.'
  }[grade];

  const memInsight=memoryScore>=80?'Sharp color recall and strong visual memory.':
    memoryScore>=60?'Decent memory, some lapses under pressure.':
    'Memory performance was below average — rest helps consolidate memory.';
  const slpInsight=sleepScore>=80?'Your sleep habits look healthy and restorative.':
    sleepScore>=55?'Sleep quality is moderate — some room to improve.':
    'Your sleep is significantly disrupted. This directly impacts cognition.';

  setProgress(TOTAL_STEPS);
  showScreen('screen-results');

  document.getElementById('screen-results').innerHTML=`
    <div class="result-header">
      <div class="grade">${grade}</div>
      <h2>Well done, ${username}!</h2>
      <p>${gradeMsg}</p>
    </div>
    <div class="sep"></div>
    <div class="score-breakdown">
      <div class="score-card">
        <div class="val mem-color">${memoryScore}</div>
        <div class="lbl">Memory Score</div>
      </div>
      <div class="score-card">
        <div class="val slp-color">${sleepScore}</div>
        <div class="lbl">Sleep Score</div>
      </div>
    </div>
    <div class="insight-box">
      <strong>Memory:</strong> ${memInsight}<br><br>
      <strong>Sleep:</strong> ${slpInsight}
    </div>
    <button class="btn-submit" id="btn-submit" onclick="submitToAPI()">SAVE TO DATABASE →</button>
    <div class="submit-status" id="submit-status"></div>
  `;
}

// ── SUBMIT ───────────────────────────────────────────────────────
async function submitToAPI(){
  const btn=document.getElementById('btn-submit');
  const status=document.getElementById('submit-status');
  btn.disabled=true; btn.textContent='Saving...';
  status.textContent=''; status.className='submit-status';
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const dateStr = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;

  try{
    const res=await fetch(`${API}/create_contact`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name:username,memory_score:memoryScore,sleep_score:sleepScore,date:dateStr})
    });
    const data=await res.json();
    if(res.ok){
      status.textContent='✓ Saved successfully!';
      status.className='submit-status ok';
      btn.textContent='SAVED ✓';
    } else {
      status.textContent='✗ '+data.message;
      status.className='submit-status err';
      btn.textContent='RETRY →'; btn.disabled=false;
    }
  } catch(e){
    status.textContent='✗ Could not reach server.';
    status.className='submit-status err';
    btn.textContent='RETRY →'; btn.disabled=false;
  }
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.getElementById('screen-welcome').classList.contains('active')) startApp();
});
</script>
